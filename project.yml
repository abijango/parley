# XcodeGen project definition.
# Regenerate the .xcodeproj after editing this file:  xcodegen generate
#
# App name: Parley. The name drives PRODUCT_NAME, the bundle id, the `Parley/`
# source dir, Info.plist's CFBundleDisplayName, and AppInfo.name. `TODO(app-name)`
# markers across the repo tag the spots that follow the app name.

name: Parley
options:
  bundleIdPrefix: com.naufalmir
  deploymentTarget:
    macOS: "26.0"          # macOS 26+ (Tahoe) only — Liquid Glass; process taps (14.4+) subsumed
  createIntermediateGroups: true
  groupSortPosition: top

packages:
  # Argmax OSS SDK: provides BOTH WhisperKit (ASR) and SpeakerKit (diarization +
  # speaker embeddings) as products of one package. The per-speaker embedding API
  # (DiarizationResult.speakerCentroidEmbeddings / nearestSpeakerCentroid) is only
  # on main (not the v1.0.0 tag), so we pin a validated main commit. NOTE: this
  # upgrades WhisperKit from the old 0.18.x line to the 1.0 API.
  ArgmaxOSS:
    url: https://github.com/argmaxinc/argmax-oss-swift.git
    revision: 94cf6b120cf9dde32d9dea01acc326e77371302c
  MarkdownUI:
    url: https://github.com/gonzalezreal/swift-markdown-ui.git
    from: "2.4.0"           # SwiftUI GitHub-flavored markdown renderer
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    from: "0.14.8"          # native Parakeet ASR + diarization + speaker embeddings (Apache-2.0)

targets:
  Parley:                 # TODO(app-name)
    type: application
    platform: macOS
    deploymentTarget: "26.0"
    sources:
      - path: Parley
        excludes:
          - "Resources/Fonts/**"   # added as a folder reference below (kept out of the main glob)
      # Bundled Geist + Geist Mono (OFL). Folder reference so the "Fonts" directory is
      # preserved inside Contents/Resources, where ATSApplicationFontsPath points.
      - path: Parley/Resources/Fonts
        type: folder
        buildPhase: resources
    dependencies:
      - package: ArgmaxOSS
        product: WhisperKit
      - package: ArgmaxOSS
        product: SpeakerKit
      - package: MarkdownUI
      - package: FluidAudio
    info:
      path: Parley/App/Info.plist
      properties:
        CFBundleDisplayName: Parley        # TODO(app-name)
        LSUIElement: false                   # regular Dock app with a main window (+ menu-bar companion)
        LSMinimumSystemVersion: "26.0"
        NSMicrophoneUsageDescription: "Records your microphone so meetings can be transcribed locally."
        NSAudioCaptureUsageDescription: "Captures system and app audio so the other side of meetings can be transcribed locally."
        NSHumanReadableCopyright: ""
        ATSApplicationFontsPath: "Fonts"   # registers bundled Geist faces at launch (Resources/Fonts)
    entitlements:
      path: Parley/App/Parley.entitlements
      properties:
        com.apple.security.app-sandbox: false        # non-sandboxed: process taps + spawning `claude` + writing to the vault
        com.apple.security.device.audio-input: true  # microphone (required with Hardened Runtime)
    settings:
      base:
        PRODUCT_NAME: Parley                              # TODO(app-name)
        PRODUCT_BUNDLE_IDENTIFIER: com.naufalmir.parley   # TODO(app-name)
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon   # Parley/Assets.xcassets/AppIcon.appiconset
        LD_RUNPATH_SEARCH_PATHS:
          - "@executable_path/../Frameworks"
