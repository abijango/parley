<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Concept C: "Two tracks converging." Mirrored waveforms (Me=blue from the
       left, Remote=green from the right) grow toward a glowing meeting node in
       the centre — the dual-track capture made literal. Sleek/Obsidian-dark. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0" stop-color="#1B2030"/><stop offset="1" stop-color="#0A0D15"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7CC0FF"/><stop offset="1" stop-color="#2C7BF2"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#74EBA0"/><stop offset="1" stop-color="#1FB457"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#A98BFF" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#A98BFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.1" r="0.9">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.10"/>
      <stop offset="0.6" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1024" height="1024" rx="228" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="228" fill="url(#sheen)"/>

  <!-- Left (blue) bars, growing toward centre -->
  <g fill="url(#blue)">
    <rect x="232" y="452" width="48" height="120" rx="24"/>
    <rect x="316" y="397" width="48" height="230" rx="24"/>
    <rect x="400" y="342" width="48" height="340" rx="24"/>
    <rect x="476" y="287" width="48" height="450" rx="24"/>
  </g>
  <!-- Right (green) bars, mirrored -->
  <g fill="url(#green)">
    <rect x="500" y="287" width="48" height="450" rx="24"/>
    <rect x="576" y="342" width="48" height="340" rx="24"/>
    <rect x="660" y="397" width="48" height="230" rx="24"/>
    <rect x="744" y="452" width="48" height="120" rx="24"/>
  </g>

  <!-- Meeting node -->
  <circle cx="512" cy="512" r="150" fill="url(#glow)"/>
  <circle cx="512" cy="512" r="70" fill="#0A0D15"/>
  <circle cx="512" cy="512" r="70" fill="none" stroke="#C9B8FF" stroke-width="14"/>
  <circle cx="512" cy="512" r="22" fill="#C9B8FF"/>
</svg>
